# =============================================================================
# Wattplot Controller v1 — ESPHome firmware
# =============================================================================
# Implements the control law in docs/control_law.md.
#
# Hardware (see /docs/control_law.md for full context):
#   - ESP32-WROOM-32E dev board
#   - BMI160 IMU (panel tilt feedback, I2C 0x68)
#   - INA219 current/power sensor (I2C 0x40)
#   - DS18B20 temperature sensor (1-Wire)
#   - Capacitive soil moisture sensor (analog)
#   - Battery voltage divider (10k/10k, analog)
#   - DRV8871 H-bridge (IN1, IN2, EN)
#   - 2x NO roller limit switches (external 10k pullup)
#   - WS2812B status LED
#   - 12V grow light relay
#   - DPS5005 programmable buck via UART2 (9600 baud)
#
# Pin map (chosen to avoid strapping pins and ADC2 conflicts):
#   GPIO  4: DS18B20 1-Wire data
#   GPIO 16: H-bridge IN1
#   GPIO 17: H-bridge IN2
#   GPIO 18: H-bridge EN
#   GPIO 19: Grow light relay
#   GPIO 21: I2C SDA
#   GPIO 22: I2C SCL
#   GPIO 25: WS2812B data
#   GPIO 26: UART2 TX -> DPS5005 RX
#   GPIO 27: UART2 RX <- DPS5005 TX
#   GPIO 32: Soil moisture ADC (ADC1_CH4)
#   GPIO 33: Battery voltage ADC (ADC1_CH5)
#   GPIO 34: Limit switch 0° (input only, external pullup)
#   GPIO 35: Limit switch 90° (input only, external pullup)
# =============================================================================

substitutions:
  device_name: wattplot-controller
  friendly_name: "Wattplot Controller"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  comment: "Wattplot v2 — PI on motor current, IMU feedback, MPPT, soil-aware tilt"
  min_version: 2024.6.0
  on_boot:
    priority: -100
    then:
      - light.turn_on:
          id: status_led
          red: 100%
          green: 0%
          blue: 0%
          brightness: 30%
      - delay: 1s
      - script.execute: actuator_stop
      - script.execute: state_to_folding

esp32:
  board: esp32dev
  flash_size: 4MB
  framework:
    type: arduino
    version: recommended

logger:
  level: INFO

# ===== Connectivity =====
api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Wattplot-Setup"
    password: !secret ap_password

captive_portal:

web_server:
  port: 80

time:
  - platform: sntp
    id: sntp_time
    timezone: "America/Phoenix"

# ===== Solar position (built-in, no library needed) =====
sun:
  latitude: 33.45°
  longitude: -112.07°

# ===== I2C bus =====
i2c:
  - id: i2c_main
    sda: GPIO21
    scl: GPIO22
    scan: true

# ===== IMU — closed-loop panel tilt feedback =====
bmi160:
  - id: bmi_imu
    i2c_id: i2c_main
    address: 0x68
    update_interval: 100ms
    acceleration_x:
      name: "Panel Accel X"
      id: imu_accel_x
    acceleration_y:
      name: "Panel Accel Y"
      id: imu_accel_y
    acceleration_z:
      name: "Panel Accel Z"
      id: imu_accel_z

# ===== INA219 — motor current + panel bus V =====
# (Single INA219 in the motor line gives current. For panel V/I, add a
# second INA219 at address 0x41 on the panel side. For v1 we use the
# motor INA219's bus_voltage as a proxy; second INA219 is a v2 add.)

# v2.4: panel-side INA219 for energy monitoring. Solder the A0 address
# pad on the second INA219 to set it to 0x41. Place it in series with
# the panel + lead (between panel and DPS5005 input).
ina219:
  - id: ina_motor
    i2c_id: i2c_main
    address: 0x40
    shunt_resistance: 0.1Ω
    max_current: 3.2A
    update_interval: 200ms
    current:
      name: "Motor Current"
      id: motor_current
      unit_of_measurement: "A"
      accuracy_decimals: 3
      filters:
        - multiply: 0.001  # mA to A
    bus_voltage:
      name: "Panel Bus V"
      id: panel_voltage
      unit_of_measurement: "V"
      accuracy_decimals: 2

  - id: ina_panel
    i2c_id: i2c_main
    address: 0x41
    shunt_resistance: 0.1Ω
    max_current: 1.0A
    update_interval: 1s
    current:
      name: "Panel Current"
      id: panel_current
      unit_of_measurement: "A"
      accuracy_decimals: 3
      filters:
        - multiply: 0.001  # mA to A
    bus_voltage:
      name: "Panel V"
      id: panel_v
      unit_of_measurement: "V"
      accuracy_decimals: 2

# ===== Temperature =====
dallas:
  - pin: GPIO4
    id: panel_temp_sensor
    update_interval: 30s
    sensor:
      name: "Panel Temperature"
      id: panel_temperature
      unit_of_measurement: "°C"
      accuracy_decimals: 1

# ===== UART for DPS5005 MPPT =====
uart:
  - id: dps_uart
    tx_pin: GPIO26
    rx_pin: GPIO27
    baud_rate: 9600

# ===== H-bridge outputs (DRV8871) =====
output:
  - platform: gpio
    id: hb_in1_out
    pin: GPIO16
  - platform: gpio
    id: hb_in2_out
    pin: GPIO17
  - platform: gpio
    id: hb_en_out
    pin: GPIO18

# ===== Status LED (WS2812B) =====
light:
  - platform: neopixelbus
    id: status_led
    name: "Status LED"
    pin: GPIO25
    num_leds: 1
    chipset: WS2812
    rgb_order: GRB
    default_transition_length: 250ms

# ===== Analog inputs =====
sensor:
  - platform: adc
    pin: GPIO32
    id: soil_moisture_raw
    name: "Soil Moisture (raw V)"
    attenuation: auto
    update_interval: 10s

  - platform: template
    id: soil_moisture_pct
    name: "Soil Moisture"
    unit_of_measurement: "%"
    accuracy_decimals: 0
    update_interval: 10s
    lambda: |-
      // Capacitive sensor: dry ~ 3.0V, wet ~ 1.0V. Calibrate in field.
      float v = id(soil_moisture_raw).state;
      if (isnan(v)) return NAN;
      float pct = (3.0 - v) / 2.0 * 100.0;
      if (pct < 0) pct = 0;
      if (pct > 100) pct = 100;
      return pct;

  - platform: adc
    pin: GPIO33
    id: battery_v_raw
    name: "Battery Voltage (raw V)"
    attenuation: auto
    update_interval: 10s

  - platform: template
    id: battery_voltage
    name: "Battery Voltage"
    unit_of_measurement: "V"
    accuracy_decimals: 2
    update_interval: 10s
    lambda: |-
      // 10k/10k divider: V_adc = V_battery * 0.5
      float v = id(battery_v_raw).state;
      if (isnan(v)) return NAN;
      return v * 2.0;

  # ===== v2.4: Energy + SOC + POA + Efficiency =====
  # Panel power (W) from panel V × I (computed, not measured)
  - platform: template
    id: panel_power_w
    name: "Panel Power"
    unit_of_measurement: "W"
    accuracy_decimals: 2
    update_interval: 1s
    lambda: |-
      float v = id(panel_v).state;
      float i = id(panel_current).state;
      if (isnan(v) || isnan(i)) return NAN;
      return v * i;

  # Battery SOC via LiFePO4 voltage lookup table (12V 4S, 13.6V=100% .. 10.5V=0%)
  - platform: template
    id: battery_soc
    name: "Battery SOC"
    unit_of_measurement: "%"
    accuracy_decimals: 0
    update_interval: 30s
    lambda: |-
      float v = id(battery_voltage).state;
      if (isnan(v)) return NAN;
      // LiFePO4 voltage -> SOC lookup (interpolated)
      // 13.6V=100, 13.4=95, 13.3=90, 13.2=80, 13.0=60, 12.8=40, 12.5=20, 12.0=10, 10.5=0
      const float lut_v[] = {13.6, 13.4, 13.3, 13.2, 13.0, 12.8, 12.5, 12.0, 10.5};
      const float lut_s[] = { 100,   95,   90,   80,   60,   40,   20,   10,    0};
      if (v >= lut_v[0]) return 100;
      if (v <= lut_v[8]) return 0;
      for (int i = 0; i < 8; i++) {
        if (v >= lut_v[i+1] && v <= lut_v[i]) {
          return lut_s[i+1] + (lut_s[i] - lut_s[i+1]) *
                 (v - lut_v[i+1]) / (lut_v[i] - lut_v[i+1]);
        }
      }
      return 0;

  # POA irradiance (W/m^2) - Plane of Array, from solar position + tilt + clear-sky
  # Phoenix lat 33.45°N. Computes direct + diffuse on the tilted panel.
  - platform: template
    id: poa_irradiance
    name: "POA Irradiance"
    unit_of_measurement: "W/m²"
    accuracy_decimals: 0
    update_interval: 60s
    lambda: |-
      // Get current time. Use ESPHome's time component or RTC.
      auto now = id(sntp_time).now();
      if (!now.is_valid()) return NAN;
      int doy = now.day_of_year;  // 1-365
      float hour = now.hour + now.minute / 60.0 + now.second / 3600.0;
      // Phoenix coordinates (33.45°N, -112.07°W, no DST)
      const float lat = 33.45 * M_PI / 180.0;
      // Solar declination
      float dec = 23.45 * sin((360.0 / 365.0) * (doy - 81) * M_PI / 180.0)
                  * M_PI / 180.0;
      // Equation of time + longitude correction for solar time (simplified)
      float lon_correction = -112.07 / 15.0;  // hours
      float solar_hour = hour + lon_correction;
      float hour_angle = (solar_hour - 12.0) * 15.0 * M_PI / 180.0;
      // Solar altitude
      float sin_alt = sin(lat) * sin(dec) + cos(lat) * cos(dec) * cos(hour_angle);
      if (sin_alt <= 0.01) return 0;  // sun below horizon
      float altitude = asin(sin_alt);
      // Air mass (Kasten & Young)
      float am = 1.0 / (sin_alt + 0.50572 *
             pow(6.07995 + altitude * 180.0 / M_PI, -1.6364));
      // Clear-sky direct normal irradiance (Ineichen simplified)
      float dni = 1361.0 * pow(0.7, pow(am, 0.678));
      // Panel tilt (from runtime state)
      float tilt = id(panel_tilt).state * M_PI / 180.0;
      if (isnan(tilt)) tilt = 0;
      // For Phoenix south-facing panel, azimuth_sun ≈ 180° at noon,
      // panel_azimuth = 180°, so cos(aoi) ≈ cos(altitude - tilt).
      // Simplified aoi for south-facing panel:
      float aoi = fabs(altitude - tilt);
      if (aoi > M_PI / 2.0) return 0;
      float poa_direct = dni * cos(aoi);
      // Diffuse: isotropic sky model, ~10% of DNI as DHI
      float dhi = 0.10 * dni;
      float poa_diffuse = dhi * (1.0 + cos(tilt)) / 2.0;
      return poa_direct + poa_diffuse;

  # Panel efficiency = (V*I) / (POA * area) * 100
  # ECO-WORTHY 10W: 13.3" × 8.1" = 0.0695 m^2
  - platform: template
    id: panel_efficiency
    name: "Panel Efficiency"
    unit_of_measurement: "%"
    accuracy_decimals: 1
    update_interval: 60s
    lambda: |-
      float p = id(panel_power_w).state;
      float poa = id(poa_irradiance).state;
      if (isnan(p) || isnan(poa)) return NAN;
      if (poa < 50.0) return 0;  // noise floor at low light
      const float area_m2 = 13.3 * 8.1 * 0.00064516;  // in^2 to m^2
      return 100.0 * p / (poa * area_m2);

  # Energy total (lifetime, persists across reboots, capped at 10 MWh)
  - platform: template
    id: energy_total
    name: "Energy Total"
    unit_of_measurement: "kWh"
    accuracy_decimals: 3
    update_interval: 60s
    lambda: |-
      // Read from the persistent global (g_energy_total_kwh, restore_value: true)
      return id(g_energy_total_kwh);

  # Daily energy (reset at midnight)
  - platform: template
    id: energy_today
    name: "Energy Today"
    unit_of_measurement: "kWh"
    accuracy_decimals: 3
    update_interval: 60s
    lambda: |-
      static float today = 0;
      static int last_doy = -1;
      auto now = id(sntp_time).now();
      if (last_doy != now.day_of_year) {
        today = 0;
        last_doy = now.day_of_year;
      }
      return today;

  # Panel tilt from IMU (atan2 of accel)
  - platform: template
    name: "Panel Tilt"
    id: panel_tilt
    unit_of_measurement: "°"
    accuracy_decimals: 1
    update_interval: 100ms
    lambda: |-
      float ax = id(imu_accel_x).state;
      float ay = id(imu_accel_y).state;
      float az = id(imu_accel_z).state;
      if (isnan(ax) || isnan(ay) || isnan(az)) return NAN;
      // 0° = flat, 90° = vertical (panel hinged on south wall)
      return atan2(ay, az) * 57.2957795;

# ===== Limit switches =====
binary_sensor:
  - platform: gpio
    id: limit_0
    name: "Limit 0°"
    pin:
      number: GPIO34
      mode:
        input: true
        pullup: false
    filters:
      - delayed_on: 10ms
      - delayed_off: 10ms

  - platform: gpio
    id: limit_90
    name: "Limit 90°"
    pin:
      number: GPIO35
      mode:
        input: true
        pullup: false
    filters:
      - delayed_on: 10ms
      - delayed_off: 10ms

# ===== Grow light + H-bridge + watering solenoid as switches =====
switch:
  - platform: gpio
    id: grow_light_relay
    name: "Grow Light"
    pin: GPIO19
    icon: "mdi:lightbulb"

  - platform: gpio
    id: watering_solenoid
    name: "Watering Solenoid"
    pin: GPIO5
    icon: "mdi:water"
    # Auto-off after 30s safety watchdog (set by automation, not here)

  - platform: template
    id: watering_automation
    name: "Watering Automation"
    icon: "mdi:auto-fix"
    restore_mode: RESTORE_DEFAULT_ON
    lambda: |-
      return id(watering_auto_enabled);

  - platform: output
    id: hb_in1_sw
    name: "H-bridge IN1"
    output: hb_in1_out
  - platform: output
    id: hb_in2_sw
    name: "H-bridge IN2"
    output: hb_in2_out
  - platform: output
    id: hb_en_sw
    name: "H-bridge EN"
    output: hb_en_out

# ===== Globals (persistent state) =====
# (Merged into the main globals: section below)

# ===== Configurable parameters =====
number:
  - platform: template
    id: target_current
    name: "Target Current (A)"
    min_value: 0.0
    max_value: 2.0
    step: 0.05
    initial_value: "0.5"
    optimistic: true
    restore_value: true

  - platform: template
    id: i_safe
    name: "I Safe (A)"
    min_value: 1.0
    max_value: 3.0
    step: 0.1
    initial_value: "2.5"
    optimistic: true
    restore_value: true

  - platform: template
    id: deadband_a
    name: "Current Deadband (A)"
    min_value: 0.05
    max_value: 0.5
    step: 0.05
    initial_value: "0.15"
    optimistic: true
    restore_value: true

  - platform: template
    id: commanded_tilt
    name: "Commanded Tilt (°)"
    min_value: 0
    max_value: 90
    step: 5
    initial_value: "35"
    optimistic: true
    restore_value: true

  - platform: template
    id: kp_value
    name: "Kp (deg/A)"
    min_value: 0.0
    max_value: 10.0
    step: 0.1
    initial_value: "2.0"
    optimistic: true
    restore_value: true

  - platform: template
    id: ki_value
    name: "Ki (deg/(A·s))"
    min_value: 0.0
    max_value: 1.0
    step: 0.01
    initial_value: "0.10"
    optimistic: true
    restore_value: true

  - platform: template
    id: max_step_per_sec
    name: "Max Step (°/s)"
    min_value: 0.5
    max_value: 10.0
    step: 0.5
    initial_value: "3.0"
    optimistic: true
    restore_value: true

# ===== State machine =====
select:
  - platform: template
    id: controller_state
    name: "Controller State"
    options:
      - "Normal"
      - "Monitoring"
      - "Folding"
      - "Locked"
    initial_option: "Folding"   # safe default
    optimistic: true
    restore_value: true

  - platform: template
    id: controller_mode
    name: "Controller Mode"
    options:
      - "Power"   # 35° tilt, max kWh
      - "BedSun"  # 90° vertical, full bed sun
    initial_option: "Power"
    optimistic: true
    restore_value: true

  - platform: template
    id: grow_light_mode
    name: "Grow Light Mode"
    options:
      - "Off"
      - "DLI-TopUp"  # turn on to fill DLI gap
      - "Manual"
    initial_option: "Off"
    optimistic: true
    restore_value: true

# ===== Globals (control state) =====
globals:
  - id: g_integral
    type: float
    initial_value: "0.0"
    restore_value: false
  - id: g_dps_v_set
    type: float
    initial_value: "13.8"
    restore_value: true
  - id: g_dps_step
    type: float
    initial_value: "0.05"
    restore_value: false
  - id: g_p_prev
    type: float
    initial_value: "0.0"
    restore_value: false
  - id: g_nws_max_wind_mph
    type: float
    initial_value: "0.0"
    restore_value: false
  - id: g_nws_rain_forecast
    type: bool
    initial_value: "false"
    restore_value: false
  - id: g_nws_last_poll_ms
    type: int
    initial_value: "0"
    restore_value: false
  - id: g_state_entered_ms
    type: int
    initial_value: "0"
    restore_value: false
  - id: g_monitoring_countdown_ms
    type: int
    initial_value: "0"
    restore_value: false
  - id: g_locked_countdown_ms
    type: int
    initial_value: "0"
    restore_value: false
  - id: g_daily_dli_mol
    type: float
    initial_value: "0.0"
    restore_value: false
  - id: g_dli_target_mol
    type: float
    initial_value: "20.0"
    restore_value: true
  # ===== v2.4: Watering + energy monitoring state =====
  - id: watering_auto_enabled
    type: bool
    initial_value: "true"
    restore_value: true
  - id: watering_events_today
    type: int
    initial_value: "0"
    restore_value: false
  - id: water_ml_today
    type: float
    initial_value: "0.0"
    restore_value: false
  - id: is_night_flag
    type: bool
    initial_value: "false"
    restore_value: false
  - id: g_energy_total_kwh
    type: float
    initial_value: "0.0"
    restore_value: true

# ===== Scripts (actuator + state transitions + side-effects) =====
script:
  - id: actuator_extend
    mode: restart
    then:
      - switch.turn_on: hb_in1_sw
      - switch.turn_off: hb_in2_sw
      - switch.turn_on: hb_en_sw
      - light.turn_on:
          id: status_led
          green: 100%
          red: 0%
          blue: 0%
          brightness: 80%

  - id: actuator_retract
    mode: restart
    then:
      - switch.turn_off: hb_in1_sw
      - switch.turn_on: hb_in2_sw
      - switch.turn_on: hb_en_sw
      - light.turn_on:
          id: status_led
          red: 100%
          green: 0%
          blue: 0%
          brightness: 80%

  - id: actuator_stop
    mode: restart
    then:
      - switch.turn_off: hb_in1_sw
      - switch.turn_off: hb_in2_sw
      - switch.turn_off: hb_en_sw
      - light.turn_on:
          id: status_led
          yellow: 100%
          red: 50%
          green: 50%
          blue: 0%
          brightness: 60%

  - id: state_to_normal
    then:
      - select.set:
          id: controller_state
          option: "Normal"
      - lambda: 'id(g_state_entered_ms) = millis();'
      - light.turn_on:
          id: status_led
          green: 100%
          brightness: 70%

  - id: state_to_monitoring
    then:
      - select.set:
          id: controller_state
          option: "Monitoring"
      - lambda: |-
          id(g_state_entered_ms) = millis();
          id(g_monitoring_countdown_ms) = 0;
      - light.turn_on:
          id: status_led
          yellow: 100%
          brightness: 70%

  - id: state_to_folding
    then:
      - select.set:
          id: controller_state
          option: "Folding"
      - lambda: 'id(g_state_entered_ms) = millis();'
      - script.execute: actuator_retract
      - light.turn_on:
          id: status_led
          red: 100%
          brightness: 90%

  - id: state_to_locked
    then:
      - select.set:
          id: controller_state
          option: "Locked"
      - lambda: |-
          id(g_state_entered_ms) = millis();
          id(g_locked_countdown_ms) = 0;
      - script.execute: actuator_stop
      - light.turn_on:
          id: status_led
          red: 50%
          blue: 50%
          brightness: 60%

  # MPPT perturb-and-observe (P&O)
  - id: mppt_step
    mode: single
    then:
      - lambda: |-
          float v = id(panel_voltage).state;
          float i_a = id(motor_current).state;  // proxy; swap with panel-side INA219
          if (isnan(v) || isnan(i_a)) return;
          float p = v * i_a;
          if (id(g_p_prev) > 0.0) {
            if (p > id(g_p_prev)) {
              // Power increased, keep stepping same direction
            } else {
              // Power decreased, reverse
              id(g_dps_step) = -id(g_dps_step);
            }
          }
          id(g_p_prev) = p;
          id(g_dps_v_set) = id(g_dps_v_set) + id(g_dps_step);
          // Clamp to safe LiFePO4 charge range
          if (id(g_dps_v_set) > 14.4) id(g_dps_v_set) = 14.4;
          if (id(g_dps_v_set) < 12.0) id(g_dps_v_set) = 12.0;
          // Send to DPS5005
          char buf[32];
          snprintf(buf, sizeof(buf), "VSET1:%.2f\n", (double)id(g_dps_v_set));
          id(dps_uart).write_str(buf);
          id(dps_uart).write_str("ISET1:5.00\n");
          id(dps_uart).write_str("OUT1:1\n");
          ESP_LOGI("mppt", "V=%.2f I=%.3f P=%.2f -> Vset=%.2f",
                    v, i_a, p, id(g_dps_v_set));

  # NWS forecast poll
  - id: nws_poll
    mode: single
    then:
      - http_request.get:
          url: "https://api.weather.gov/gridpoints/PSR/153,87/forecast"
          capture_response: true
          timeout: 8s
          on_response:
            then:
              - lambda: |-
                  // Parse the NWS forecast JSON.
                  // Each "period" has windSpeed like "15 mph" and shortForecast.
                  // We find max wind over next 12h and whether rain is forecast.
                  // ESPHome's json component gives us parsed access; using
                  // root["properties"]["periods"][i]["windSpeed"].
                  float max_wind = 0.0;
                  bool rain = false;
                  for (int i = 0; i < 12 && i < root["properties"]["periods"].size(); i++) {
                    const char* ws = root["properties"]["periods"][i]["windSpeed"];
                    const char* fc = root["properties"]["periods"][i]["shortForecast"];
                    if (ws != nullptr) {
                      // parse "15 mph" or "15 to 25 mph"
                      float v = atof(ws);
                      if (v > max_wind) max_wind = v;
                    }
                    if (fc != nullptr && (strstr(fc, "Rain") != nullptr || strstr(fc, "Showers") != nullptr)) {
                      rain = true;
                    }
                  }
                  id(g_nws_max_wind_mph) = max_wind;
                  id(g_nws_rain_forecast) = rain;
                  id(g_nws_last_poll_ms) = millis();
                  ESP_LOGI("nws", "max wind=%.0f mph, rain=%d", max_wind, rain);

  # Compute today's natural DLI from sun position + GHI (rough)
  - id: update_dli_estimate
    mode: single
    then:
      - lambda: |-
          // Rough daily DLI: integrate today's expected GHI between sunrise and sunset.
          // For v1 we estimate: DLI_daily = GHI_daily * 0.45_PAR * 3600s/hr * 8 hrs * (mol/J conversion)
          // Use the sun component to get today's max solar elevation (rough proxy for day length).
          // For Phoenix summer: ~50 mol/m2/day. For winter: ~25.
          // v1 uses a lookup based on month:
          int m = id(sntp_time).now().month;
          float est;
          if (m == 12 || m == 1 || m == 2) est = 22.0;       // winter
          else if (m == 3 || m == 4 || m == 10 || m == 11) est = 35.0;  // shoulder
          else if (m == 5 || m == 9) est = 42.0;            // spring/fall
          else est = 45.0;                                   // summer
          id(g_daily_dli_mol) = est;
          ESP_LOGI("dli", "Estimated natural DLI: %.0f mol/m²/day", est);

# ===== Intervals =====
interval:
  - interval: 1s
    id: control_loop
    then:
      - lambda: |-
          // === 1 Hz main control loop ===
          // Implements the state machine + PI controller from docs/control_law.md
          const char* state = id(controller_state).state.c_str();
          float i_motor = id(motor_current).state;
          float tilt_actual = id(panel_tilt).state;
          float i_safe = id(i_safe).state;
          bool at_zero = id(limit_0).state;
          bool at_ninety = id(limit_90).state;

          // ----- Hard current limit → emergency fold -----
          if (i_motor > i_safe + 0.3) {
            // Above hard limit, override everything
            if (strcmp(state, "Folding") != 0) {
              id(script_state_to_folding).execute();
            }
            return;  // skip the rest of the loop
          }

          // ----- State machine transitions -----
          if (strcmp(state, "Normal") == 0) {
            // NORMAL: PI loop. Trigger MONITORING if current > 0.5 * i_safe
            if (i_motor > 0.5 * i_safe) {
              id(script_state_to_monitoring).execute();
            } else {
              // Run PI loop
              float setpoint = id(target_current).state;
              float deadband = id(deadband_a).state;
              float error = i_motor - setpoint;
              if (fabs(error) > deadband) {
                id(g_integral) = id(g_integral) + error * 1.0;  // dt = 1s
                // Anti-windup
                if (id(g_integral) > 5.0) id(g_integral) = 5.0;
                if (id(g_integral) < -5.0) id(g_integral) = -5.0;
                float adjust = id(kp_value).state * error + id(ki_value).state * id(g_integral);
                float target_angle = tilt_actual - adjust;
                // Clamp to 0 .. commanded_tilt
                float cmd = id(commanded_tilt).state;
                if (target_angle < 0.0) target_angle = 0.0;
                if (target_angle > cmd) target_angle = cmd;
                // Rate limit
                float max_step = id(max_step_per_sec).state * 1.0;  // dt = 1s
                float step = target_angle - tilt_actual;
                if (step > max_step) step = max_step;
                if (step < -max_step) step = -max_step;
                // Apply step
                if (step > 0.5) {
                  // Need to tilt up (toward commanded), which means extend
                  if (at_ninety) {
                    // Already at 90°, stop
                    id(script_actuator_stop).execute();
                  } else {
                    id(script_actuator_extend).execute();
                  }
                } else if (step < -0.5) {
                  // Need to tilt down, which means retract
                  if (at_zero) {
                    id(script_actuator_stop).execute();
                  } else {
                    id(script_actuator_retract).execute();
                  }
                } else {
                  id(script_actuator_stop).execute();
                }
              } else {
                // Within deadband, slowly drift toward commanded
                id(g_integral) = id(g_integral) * 0.9;
                float cmd = id(commanded_tilt).state;
                if (tilt_actual < cmd - 0.5) {
                  if (!at_ninety) id(script_actuator_extend).execute();
                } else if (tilt_actual > cmd + 0.5) {
                  if (!at_zero) id(script_actuator_retract).execute();
                } else {
                  id(script_actuator_stop).execute();
                }
              }
            }
          } else if (strcmp(state, "Monitoring") == 0) {
            // 15 min countdown
            unsigned long elapsed = millis() - id(g_state_entered_ms);
            if (elapsed > 900000) {  // 15 min
              if (i_motor < 0.5 * i_safe) {
                // Wind passed, back to NORMAL
                id(g_integral) = 0.0;
                id(script_state_to_normal).execute();
              } else {
                // Still windy, fold
                id(script_state_to_folding).execute();
              }
            }
          } else if (strcmp(state, "Folding") == 0) {
            // Wait for limit switch at 0°
            if (at_zero) {
              id(script_actuator_stop).execute();
              id(script_state_to_locked).execute();
            } else if (millis() - id(g_state_entered_ms) > 60000) {
              // Timeout — assume we hit the limit (limit switch may have failed)
              id(script_actuator_stop).execute();
              id(script_state_to_locked).execute();
            }
          } else if (strcmp(state, "Locked") == 0) {
            // 30 min hold, then check
            unsigned long elapsed = millis() - id(g_state_entered_ms);
            if (elapsed > 1800000) {  // 30 min
              if (i_motor < 0.3 * i_safe) {
                // Wind really gone, back to NORMAL
                id(g_integral) = 0.0;
                id(script_state_to_normal).execute();
              } else {
                // Still windy, hold another 30 min
                id(g_state_entered_ms) = millis();
              }
            }
          }

  - interval: 900s
    id: nws_poll_interval
    then:
      - script.execute: nws_poll

  - interval: 10s
    id: mppt_loop
    then:
      - script.execute: mppt_step

  - interval: 300s
    id: dli_update
    then:
      - script.execute: update_dli_estimate

  - interval: 1s
    id: energy_integration
    then:
      - lambda: |-
          // === v2.4: Energy integration (1-Hz) ===
          // Integrate panel V×I every 1s into today + total counters.
          float p = id(panel_power_w).state;
          if (isnan(p)) return;
          // 1 second = 1/3600/1000 kWh of integration
          float delta_kwh = p / 3600.0 / 1000.0;
          // Update today (reset at midnight)
          static float today = 0;
          static int last_doy = -1;
          auto now = id(sntp_time).now();
          if (now.is_valid() && now.day_of_year != last_doy) {
            today = 0;
            last_doy = now.day_of_year;
            id(water_ml_today) = 0;
            id(watering_events_today) = 0;
          }
          today += delta_kwh;
          id(energy_today).publish_state(today);
          // Update total (capped at 10 MWh to prevent float drift)
          float total = id(g_energy_total_kwh) + delta_kwh;
          if (total > 10000.0) total = 10000.0;
          id(g_energy_total_kwh) = total;  // restore_value: true persists across reboots
          id(energy_total).publish_state(total);
          // Update is_night flag for watering decisions
          id(is_night_flag) = (p < 0.5);

  - interval: 60s
    id: watering_check
    then:
      - lambda: |-
          // === v2.4: Watering automation (60s polling) ===
          if (!id(watering_auto_enabled)) return;
          if (id(controller_state).state == "Folding") return;
          if (id(watering_solenoid).state) return;
          float moisture = id(soil_moisture_pct).state;
          float panel_t = id(panel_temperature).state;
          float bat_v = id(battery_voltage).state;
          float bat_soc = id(battery_soc).state;
          if (isnan(moisture) || isnan(panel_t) || isnan(bat_v)) return;
          if (panel_t > 45.0) return;
          if (bat_v < 11.5) return;
          if (bat_soc < 20.0) return;
          if (id(is_night_flag)) return;
          if (id(watering_events_today) >= 3) return;
          if (moisture < 30.0) {
            // Trigger 50 sec solenoid = ~100 mL at 2 mL/sec
            id(watering_solenoid).turn_on();
            id(watering_events_today) += 1;
            id(water_ml_today) += 100;
            ESP_LOGI("watering", "Watered: moisture=%.0f%%, events_today=%d",
                     moisture, id(watering_events_today));
            // Schedule auto-off after 30 sec (safety watchdog)
            // (handled by separate interval below)
          }

  - interval: 30s
    id: solenoid_safety_watchdog
    then:
      - lambda: |-
          // Hard kill: if solenoid has been on for >=30s, turn it off
          static unsigned long on_since = 0;
          if (id(watering_solenoid).state) {
            if (on_since == 0) on_since = millis();
            if (millis() - on_since >= 30000) {
              id(watering_solenoid).turn_off();
              on_since = 0;
              ESP_LOGW("watering", "Safety watchdog killed solenoid after 30s");
            }
          } else {
            on_since = 0;
          }

  - interval: 60s
    id: grow_light_tick
    then:
      - lambda: |-
          // === Grow light DLI top-up ===
          // If grow light mode is DLI-TopUp:
          //   - compute today's estimated natural DLI (g_daily_dli_mol)
          //   - if natural DLI < target, run grow lights in pre-dawn / post-sunset
          //   - ensure min 8 hr dark, max 16 hr light
          if (strcmp(id(grow_light_mode).state.c_str(), "DLI-TopUp") != 0) return;
          int hour = id(sntp_time).now().hour;
          // Pre-dawn (4-7am) and post-sunset (6-9pm) are the safe extension windows.
          bool in_extension_window = (hour >= 4 && hour < 7) || (hour >= 18 && hour < 21);
          if (!in_extension_window) {
            id(grow_light_relay).turn_off();
            return;
          }
          // For v1: if daily DLI estimate < target, turn on grow light
          if (id(g_daily_dli_mol) < id(g_dli_target_mol)) {
            id(grow_light_relay).turn_on();
          } else {
            id(grow_light_relay).turn_off();
          }

  - interval: 5s
    id: watchdog
    then:
      - lambda: 'ESP_LOGD("watchdog", "alive, state=%s I=%.2fA tilt=%.1f°",
                    id(controller_state).state.c_str(),
                    id(motor_current).state,
                    id(panel_tilt).state);'


