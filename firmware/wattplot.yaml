# =============================================================================
# Wattplot Controller v1 — ESPHome firmware
# =============================================================================
# Implements the control law in docs/control_law.md.
#
# Hardware (see /docs/control_law.md for full context):
#   - ESP32-WROOM-32E dev board
#   - BMI160 IMU (panel tilt feedback, I2C 0x68)
#   - INA219 current/power sensor (I2C 0x40)
#   - DS18B20 temperature sensor (1-Wire)
#   - Capacitive soil moisture sensor (analog)
#   - Battery voltage divider (10k/10k, analog)
#   - DRV8871 H-bridge (IN1, IN2, EN)
#   - 2x NO roller limit switches (external 10k pullup)
#   - WS2812B status LED
#   - 12V grow light relay
#   - DPS5005 programmable buck via UART2 (9600 baud)
#
# Pin map (chosen to avoid strapping pins and ADC2 conflicts):
#   GPIO  4: DS18B20 1-Wire data
#   GPIO 16: H-bridge IN1
#   GPIO 17: H-bridge IN2
#   GPIO 18: H-bridge EN
#   GPIO 19: Grow light relay
#   GPIO 21: I2C SDA
#   GPIO 22: I2C SCL
#   GPIO 25: WS2812B data
#   GPIO 26: UART2 TX -> DPS5005 RX
#   GPIO 27: UART2 RX <- DPS5005 TX
#   GPIO 32: Soil moisture ADC (ADC1_CH4)
#   GPIO 33: Battery voltage ADC (ADC1_CH5)
#   GPIO 34: Limit switch 0° (input only, external pullup)
#   GPIO 35: Limit switch 90° (input only, external pullup)
# =============================================================================

substitutions:
  device_name: wattplot-controller
  friendly_name: "Wattplot Controller"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  comment: "Wattplot v2 — PI on motor current, IMU feedback, MPPT, soil-aware tilt"
  min_version: 2024.6.0
  on_boot:
    priority: -100
    then:
      - light.turn_on:
          id: status_led
          red: 100%
          green: 0%
          blue: 0%
          brightness: 30%
      - delay: 1s
      - script.execute: actuator_stop
      - script.execute: state_to_folding

esp32:
  board: esp32dev
  flash_size: 4MB
  framework:
    type: arduino
    version: recommended

logger:
  level: INFO

# ===== Connectivity =====
api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Wattplot-Setup"
    password: !secret ap_password

captive_portal:

web_server:
  port: 80

time:
  - platform: sntp
    id: sntp_time
    timezone: "America/Phoenix"

# ===== Solar position (built-in, no library needed) =====
sun:
  latitude: 33.45°
  longitude: -112.07°

# ===== I2C bus =====
i2c:
  - id: i2c_main
    sda: GPIO21
    scl: GPIO22
    scan: true

# ===== IMU — closed-loop panel tilt feedback =====
bmi160:
  - id: bmi_imu
    i2c_id: i2c_main
    address: 0x68
    update_interval: 100ms
    acceleration_x:
      name: "Panel Accel X"
      id: imu_accel_x
    acceleration_y:
      name: "Panel Accel Y"
      id: imu_accel_y
    acceleration_z:
      name: "Panel Accel Z"
      id: imu_accel_z

# ===== INA219 — motor current + panel bus V =====
# (Single INA219 in the motor line gives current. For panel V/I, add a
# second INA219 at address 0x41 on the panel side. For v1 we use the
# motor INA219's bus_voltage as a proxy; second INA219 is a v2 add.)
ina219:
  - id: ina_motor
    i2c_id: i2c_main
    address: 0x40
    shunt_resistance: 0.1Ω
    max_current: 3.2A
    update_interval: 200ms
    current:
      name: "Motor Current"
      id: motor_current
      unit_of_measurement: "A"
      accuracy_decimals: 3
      filters:
        - multiply: 0.001  # mA to A
    bus_voltage:
      name: "Panel Bus V"
      id: panel_voltage
      unit_of_measurement: "V"
      accuracy_decimals: 2

# ===== Temperature =====
dallas:
  - pin: GPIO4
    id: panel_temp_sensor
    update_interval: 30s
    sensor:
      name: "Panel Temperature"
      id: panel_temperature
      unit_of_measurement: "°C"
      accuracy_decimals: 1

# ===== UART for DPS5005 MPPT =====
uart:
  - id: dps_uart
    tx_pin: GPIO26
    rx_pin: GPIO27
    baud_rate: 9600

# ===== H-bridge outputs (DRV8871) =====
output:
  - platform: gpio
    id: hb_in1_out
    pin: GPIO16
  - platform: gpio
    id: hb_in2_out
    pin: GPIO17
  - platform: gpio
    id: hb_en_out
    pin: GPIO18

# ===== Status LED (WS2812B) =====
light:
  - platform: neopixelbus
    id: status_led
    name: "Status LED"
    pin: GPIO25
    num_leds: 1
    chipset: WS2812
    rgb_order: GRB
    default_transition_length: 250ms

# ===== Analog inputs =====
sensor:
  - platform: adc
    pin: GPIO32
    id: soil_moisture_raw
    name: "Soil Moisture (raw V)"
    attenuation: auto
    update_interval: 10s

  - platform: template
    id: soil_moisture_pct
    name: "Soil Moisture"
    unit_of_measurement: "%"
    accuracy_decimals: 0
    update_interval: 10s
    lambda: |-
      // Capacitive sensor: dry ~ 3.0V, wet ~ 1.0V. Calibrate in field.
      float v = id(soil_moisture_raw).state;
      if (isnan(v)) return NAN;
      float pct = (3.0 - v) / 2.0 * 100.0;
      if (pct < 0) pct = 0;
      if (pct > 100) pct = 100;
      return pct;

  - platform: adc
    pin: GPIO33
    id: battery_v_raw
    name: "Battery Voltage (raw V)"
    attenuation: auto
    update_interval: 10s

  - platform: template
    id: battery_voltage
    name: "Battery Voltage"
    unit_of_measurement: "V"
    accuracy_decimals: 2
    update_interval: 10s
    lambda: |-
      // 10k/10k divider: V_adc = V_battery * 0.5
      float v = id(battery_v_raw).state;
      if (isnan(v)) return NAN;
      return v * 2.0;

  # Panel tilt from IMU (atan2 of accel)
  - platform: template
    name: "Panel Tilt"
    id: panel_tilt
    unit_of_measurement: "°"
    accuracy_decimals: 1
    update_interval: 100ms
    lambda: |-
      float ax = id(imu_accel_x).state;
      float ay = id(imu_accel_y).state;
      float az = id(imu_accel_z).state;
      if (isnan(ax) || isnan(ay) || isnan(az)) return NAN;
      // 0° = flat, 90° = vertical (panel hinged on south wall)
      return atan2(ay, az) * 57.2957795;

# ===== Limit switches =====
binary_sensor:
  - platform: gpio
    id: limit_0
    name: "Limit 0°"
    pin:
      number: GPIO34
      mode:
        input: true
        pullup: false
    filters:
      - delayed_on: 10ms
      - delayed_off: 10ms

  - platform: gpio
    id: limit_90
    name: "Limit 90°"
    pin:
      number: GPIO35
      mode:
        input: true
        pullup: false
    filters:
      - delayed_on: 10ms
      - delayed_off: 10ms

# ===== Grow light + H-bridge as switches =====
switch:
  - platform: gpio
    id: grow_light_relay
    name: "Grow Light"
    pin: GPIO19
    icon: "mdi:lightbulb"

  - platform: output
    id: hb_in1_sw
    name: "H-bridge IN1"
    output: hb_in1_out
  - platform: output
    id: hb_in2_sw
    name: "H-bridge IN2"
    output: hb_in2_out
  - platform: output
    id: hb_en_sw
    name: "H-bridge EN"
    output: hb_en_out

# ===== Configurable parameters =====
number:
  - platform: template
    id: target_current
    name: "Target Current (A)"
    min_value: 0.0
    max_value: 2.0
    step: 0.05
    initial_value: "0.5"
    optimistic: true
    restore_value: true

  - platform: template
    id: i_safe
    name: "I Safe (A)"
    min_value: 1.0
    max_value: 3.0
    step: 0.1
    initial_value: "2.5"
    optimistic: true
    restore_value: true

  - platform: template
    id: deadband_a
    name: "Current Deadband (A)"
    min_value: 0.05
    max_value: 0.5
    step: 0.05
    initial_value: "0.15"
    optimistic: true
    restore_value: true

  - platform: template
    id: commanded_tilt
    name: "Commanded Tilt (°)"
    min_value: 0
    max_value: 90
    step: 5
    initial_value: "35"
    optimistic: true
    restore_value: true

  - platform: template
    id: kp_value
    name: "Kp (deg/A)"
    min_value: 0.0
    max_value: 10.0
    step: 0.1
    initial_value: "2.0"
    optimistic: true
    restore_value: true

  - platform: template
    id: ki_value
    name: "Ki (deg/(A·s))"
    min_value: 0.0
    max_value: 1.0
    step: 0.01
    initial_value: "0.10"
    optimistic: true
    restore_value: true

  - platform: template
    id: max_step_per_sec
    name: "Max Step (°/s)"
    min_value: 0.5
    max_value: 10.0
    step: 0.5
    initial_value: "3.0"
    optimistic: true
    restore_value: true

# ===== State machine =====
select:
  - platform: template
    id: controller_state
    name: "Controller State"
    options:
      - "Normal"
      - "Monitoring"
      - "Folding"
      - "Locked"
    initial_option: "Folding"   # safe default
    optimistic: true
    restore_value: true

  - platform: template
    id: controller_mode
    name: "Controller Mode"
    options:
      - "Power"   # 35° tilt, max kWh
      - "BedSun"  # 90° vertical, full bed sun
    initial_option: "Power"
    optimistic: true
    restore_value: true

  - platform: template
    id: grow_light_mode
    name: "Grow Light Mode"
    options:
      - "Off"
      - "DLI-TopUp"  # turn on to fill DLI gap
      - "Manual"
    initial_option: "Off"
    optimistic: true
    restore_value: true

# ===== Globals (control state) =====
globals:
  - id: g_integral
    type: float
    initial_value: "0.0"
    restore_value: false
  - id: g_dps_v_set
    type: float
    initial_value: "13.8"
    restore_value: true
  - id: g_dps_step
    type: float
    initial_value: "0.05"
    restore_value: false
  - id: g_p_prev
    type: float
    initial_value: "0.0"
    restore_value: false
  - id: g_nws_max_wind_mph
    type: float
    initial_value: "0.0"
    restore_value: false
  - id: g_nws_rain_forecast
    type: bool
    initial_value: "false"
    restore_value: false
  - id: g_nws_last_poll_ms
    type: int
    initial_value: "0"
    restore_value: false
  - id: g_state_entered_ms
    type: int
    initial_value: "0"
    restore_value: false
  - id: g_monitoring_countdown_ms
    type: int
    initial_value: "0"
    restore_value: false
  - id: g_locked_countdown_ms
    type: int
    initial_value: "0"
    restore_value: false
  - id: g_daily_dli_mol
    type: float
    initial_value: "0.0"
    restore_value: false
  - id: g_dli_target_mol
    type: float
    initial_value: "20.0"
    restore_value: true

# ===== Scripts (actuator + state transitions + side-effects) =====
script:
  - id: actuator_extend
    mode: restart
    then:
      - switch.turn_on: hb_in1_sw
      - switch.turn_off: hb_in2_sw
      - switch.turn_on: hb_en_sw
      - light.turn_on:
          id: status_led
          green: 100%
          red: 0%
          blue: 0%
          brightness: 80%

  - id: actuator_retract
    mode: restart
    then:
      - switch.turn_off: hb_in1_sw
      - switch.turn_on: hb_in2_sw
      - switch.turn_on: hb_en_sw
      - light.turn_on:
          id: status_led
          red: 100%
          green: 0%
          blue: 0%
          brightness: 80%

  - id: actuator_stop
    mode: restart
    then:
      - switch.turn_off: hb_in1_sw
      - switch.turn_off: hb_in2_sw
      - switch.turn_off: hb_en_sw
      - light.turn_on:
          id: status_led
          yellow: 100%
          red: 50%
          green: 50%
          blue: 0%
          brightness: 60%

  - id: state_to_normal
    then:
      - select.set:
          id: controller_state
          option: "Normal"
      - lambda: 'id(g_state_entered_ms) = millis();'
      - light.turn_on:
          id: status_led
          green: 100%
          brightness: 70%

  - id: state_to_monitoring
    then:
      - select.set:
          id: controller_state
          option: "Monitoring"
      - lambda: |-
          id(g_state_entered_ms) = millis();
          id(g_monitoring_countdown_ms) = 0;
      - light.turn_on:
          id: status_led
          yellow: 100%
          brightness: 70%

  - id: state_to_folding
    then:
      - select.set:
          id: controller_state
          option: "Folding"
      - lambda: 'id(g_state_entered_ms) = millis();'
      - script.execute: actuator_retract
      - light.turn_on:
          id: status_led
          red: 100%
          brightness: 90%

  - id: state_to_locked
    then:
      - select.set:
          id: controller_state
          option: "Locked"
      - lambda: |-
          id(g_state_entered_ms) = millis();
          id(g_locked_countdown_ms) = 0;
      - script.execute: actuator_stop
      - light.turn_on:
          id: status_led
          red: 50%
          blue: 50%
          brightness: 60%

  # MPPT perturb-and-observe (P&O)
  - id: mppt_step
    mode: single
    then:
      - lambda: |-
          float v = id(panel_voltage).state;
          float i_a = id(motor_current).state;  // proxy; swap with panel-side INA219
          if (isnan(v) || isnan(i_a)) return;
          float p = v * i_a;
          if (id(g_p_prev) > 0.0) {
            if (p > id(g_p_prev)) {
              // Power increased, keep stepping same direction
            } else {
              // Power decreased, reverse
              id(g_dps_step) = -id(g_dps_step);
            }
          }
          id(g_p_prev) = p;
          id(g_dps_v_set) = id(g_dps_v_set) + id(g_dps_step);
          // Clamp to safe LiFePO4 charge range
          if (id(g_dps_v_set) > 14.4) id(g_dps_v_set) = 14.4;
          if (id(g_dps_v_set) < 12.0) id(g_dps_v_set) = 12.0;
          // Send to DPS5005
          char buf[32];
          snprintf(buf, sizeof(buf), "VSET1:%.2f\n", (double)id(g_dps_v_set));
          id(dps_uart).write_str(buf);
          id(dps_uart).write_str("ISET1:5.00\n");
          id(dps_uart).write_str("OUT1:1\n");
          ESP_LOGI("mppt", "V=%.2f I=%.3f P=%.2f -> Vset=%.2f",
                    v, i_a, p, id(g_dps_v_set));

  # NWS forecast poll
  - id: nws_poll
    mode: single
    then:
      - http_request.get:
          url: "https://api.weather.gov/gridpoints/PSR/153,87/forecast"
          capture_response: true
          timeout: 8s
          on_response:
            then:
              - lambda: |-
                  // Parse the NWS forecast JSON.
                  // Each "period" has windSpeed like "15 mph" and shortForecast.
                  // We find max wind over next 12h and whether rain is forecast.
                  // ESPHome's json component gives us parsed access; using
                  // root["properties"]["periods"][i]["windSpeed"].
                  float max_wind = 0.0;
                  bool rain = false;
                  for (int i = 0; i < 12 && i < root["properties"]["periods"].size(); i++) {
                    const char* ws = root["properties"]["periods"][i]["windSpeed"];
                    const char* fc = root["properties"]["periods"][i]["shortForecast"];
                    if (ws != nullptr) {
                      // parse "15 mph" or "15 to 25 mph"
                      float v = atof(ws);
                      if (v > max_wind) max_wind = v;
                    }
                    if (fc != nullptr && (strstr(fc, "Rain") != nullptr || strstr(fc, "Showers") != nullptr)) {
                      rain = true;
                    }
                  }
                  id(g_nws_max_wind_mph) = max_wind;
                  id(g_nws_rain_forecast) = rain;
                  id(g_nws_last_poll_ms) = millis();
                  ESP_LOGI("nws", "max wind=%.0f mph, rain=%d", max_wind, rain);

  # Compute today's natural DLI from sun position + GHI (rough)
  - id: update_dli_estimate
    mode: single
    then:
      - lambda: |-
          // Rough daily DLI: integrate today's expected GHI between sunrise and sunset.
          // For v1 we estimate: DLI_daily = GHI_daily * 0.45_PAR * 3600s/hr * 8 hrs * (mol/J conversion)
          // Use the sun component to get today's max solar elevation (rough proxy for day length).
          // For Phoenix summer: ~50 mol/m2/day. For winter: ~25.
          // v1 uses a lookup based on month:
          int m = id(sntp_time).now().month;
          float est;
          if (m == 12 || m == 1 || m == 2) est = 22.0;       // winter
          else if (m == 3 || m == 4 || m == 10 || m == 11) est = 35.0;  // shoulder
          else if (m == 5 || m == 9) est = 42.0;            // spring/fall
          else est = 45.0;                                   // summer
          id(g_daily_dli_mol) = est;
          ESP_LOGI("dli", "Estimated natural DLI: %.0f mol/m²/day", est);

# ===== Intervals =====
interval:
  - interval: 1s
    id: control_loop
    then:
      - lambda: |-
          // === 1 Hz main control loop ===
          // Implements the state machine + PI controller from docs/control_law.md
          const char* state = id(controller_state).state.c_str();
          float i_motor = id(motor_current).state;
          float tilt_actual = id(panel_tilt).state;
          float i_safe = id(i_safe).state;
          bool at_zero = id(limit_0).state;
          bool at_ninety = id(limit_90).state;

          // ----- Hard current limit → emergency fold -----
          if (i_motor > i_safe + 0.3) {
            // Above hard limit, override everything
            if (strcmp(state, "Folding") != 0) {
              id(script_state_to_folding).execute();
            }
            return;  // skip the rest of the loop
          }

          // ----- State machine transitions -----
          if (strcmp(state, "Normal") == 0) {
            // NORMAL: PI loop. Trigger MONITORING if current > 0.5 * i_safe
            if (i_motor > 0.5 * i_safe) {
              id(script_state_to_monitoring).execute();
            } else {
              // Run PI loop
              float setpoint = id(target_current).state;
              float deadband = id(deadband_a).state;
              float error = i_motor - setpoint;
              if (fabs(error) > deadband) {
                id(g_integral) = id(g_integral) + error * 1.0;  // dt = 1s
                // Anti-windup
                if (id(g_integral) > 5.0) id(g_integral) = 5.0;
                if (id(g_integral) < -5.0) id(g_integral) = -5.0;
                float adjust = id(kp_value).state * error + id(ki_value).state * id(g_integral);
                float target_angle = tilt_actual - adjust;
                // Clamp to 0 .. commanded_tilt
                float cmd = id(commanded_tilt).state;
                if (target_angle < 0.0) target_angle = 0.0;
                if (target_angle > cmd) target_angle = cmd;
                // Rate limit
                float max_step = id(max_step_per_sec).state * 1.0;  // dt = 1s
                float step = target_angle - tilt_actual;
                if (step > max_step) step = max_step;
                if (step < -max_step) step = -max_step;
                // Apply step
                if (step > 0.5) {
                  // Need to tilt up (toward commanded), which means extend
                  if (at_ninety) {
                    // Already at 90°, stop
                    id(script_actuator_stop).execute();
                  } else {
                    id(script_actuator_extend).execute();
                  }
                } else if (step < -0.5) {
                  // Need to tilt down, which means retract
                  if (at_zero) {
                    id(script_actuator_stop).execute();
                  } else {
                    id(script_actuator_retract).execute();
                  }
                } else {
                  id(script_actuator_stop).execute();
                }
              } else {
                // Within deadband, slowly drift toward commanded
                id(g_integral) = id(g_integral) * 0.9;
                float cmd = id(commanded_tilt).state;
                if (tilt_actual < cmd - 0.5) {
                  if (!at_ninety) id(script_actuator_extend).execute();
                } else if (tilt_actual > cmd + 0.5) {
                  if (!at_zero) id(script_actuator_retract).execute();
                } else {
                  id(script_actuator_stop).execute();
                }
              }
            }
          } else if (strcmp(state, "Monitoring") == 0) {
            // 15 min countdown
            unsigned long elapsed = millis() - id(g_state_entered_ms);
            if (elapsed > 900000) {  // 15 min
              if (i_motor < 0.5 * i_safe) {
                // Wind passed, back to NORMAL
                id(g_integral) = 0.0;
                id(script_state_to_normal).execute();
              } else {
                // Still windy, fold
                id(script_state_to_folding).execute();
              }
            }
          } else if (strcmp(state, "Folding") == 0) {
            // Wait for limit switch at 0°
            if (at_zero) {
              id(script_actuator_stop).execute();
              id(script_state_to_locked).execute();
            } else if (millis() - id(g_state_entered_ms) > 60000) {
              // Timeout — assume we hit the limit (limit switch may have failed)
              id(script_actuator_stop).execute();
              id(script_state_to_locked).execute();
            }
          } else if (strcmp(state, "Locked") == 0) {
            // 30 min hold, then check
            unsigned long elapsed = millis() - id(g_state_entered_ms);
            if (elapsed > 1800000) {  // 30 min
              if (i_motor < 0.3 * i_safe) {
                // Wind really gone, back to NORMAL
                id(g_integral) = 0.0;
                id(script_state_to_normal).execute();
              } else {
                // Still windy, hold another 30 min
                id(g_state_entered_ms) = millis();
              }
            }
          }

  - interval: 900s
    id: nws_poll_interval
    then:
      - script.execute: nws_poll

  - interval: 10s
    id: mppt_loop
    then:
      - script.execute: mppt_step

  - interval: 300s
    id: dli_update
    then:
      - script.execute: update_dli_estimate

  - interval: 60s
    id: grow_light_tick
    then:
      - lambda: |-
          // === Grow light DLI top-up ===
          // If grow light mode is DLI-TopUp:
          //   - compute today's estimated natural DLI (g_daily_dli_mol)
          //   - if natural DLI < target, run grow lights in pre-dawn / post-sunset
          //   - ensure min 8 hr dark, max 16 hr light
          if (strcmp(id(grow_light_mode).state.c_str(), "DLI-TopUp") != 0) return;
          int hour = id(sntp_time).now().hour;
          // Pre-dawn (4-7am) and post-sunset (6-9pm) are the safe extension windows.
          bool in_extension_window = (hour >= 4 && hour < 7) || (hour >= 18 && hour < 21);
          if (!in_extension_window) {
            id(grow_light_relay).turn_off();
            return;
          }
          // For v1: if daily DLI estimate < target, turn on grow light
          if (id(g_daily_dli_mol) < id(g_dli_target_mol)) {
            id(grow_light_relay).turn_on();
          } else {
            id(grow_light_relay).turn_off();
          }

  - interval: 5s
    id: watchdog
    then:
      - lambda: 'ESP_LOGD("watchdog", "alive, state=%s I=%.2fA tilt=%.1f°",
                    id(controller_state).state.c_str(),
                    id(motor_current).state,
                    id(panel_tilt).state);'
